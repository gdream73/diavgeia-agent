<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Διαύγεια Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; color: #1a2332; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #003476 0%, #0056b3 100%);
    color: white; padding: 20px 28px;
    display: flex; align-items: center; gap: 14px;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header p { font-size: 0.82rem; opacity: 0.8; margin-top: 2px; }

  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  .card {
    background: white; border-radius: 12px;
    padding: 20px; margin-bottom: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .card h2 { font-size: 1rem; color: #003476; margin-bottom: 14px; font-weight: 600; }

  .keyword-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .chip {
    background: #e8f0fe; color: #003476;
    border: 1.5px solid #b3c8f5; border-radius: 20px;
    padding: 5px 12px; font-size: 0.85rem;
    display: flex; align-items: center; gap: 6px;
  }
  .chip .x { cursor: pointer; color: #888; }
  .chip .x:hover { color: #c00; }

  .row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  input[type=text], input[type=date] {
    border: 1.5px solid #cdd8e8; border-radius: 8px;
    padding: 8px 12px; font-size: 0.9rem; outline: none;
    transition: border 0.2s;
  }
  input[type=text] { flex: 1; }
  input:focus { border-color: #0056b3; }

  .btn {
    background: #003476; color: white; border: none;
    border-radius: 8px; padding: 8px 18px;
    font-size: 0.9rem; cursor: pointer; transition: background 0.2s;
    white-space: nowrap;
  }
  .btn:hover { background: #0056b3; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .btn.outline { background: white; color: #003476; border: 1.5px solid #003476; }
  .btn.outline:hover { background: #e8f0fe; }
  .btn.big {
    background: linear-gradient(135deg, #003476, #0056b3);
    font-size: 1rem; padding: 10px 28px; border-radius: 10px; width: 100%; margin-top: 4px;
  }

  .status {
    display: none; align-items: center; gap: 10px;
    background: white; border-radius: 10px; padding: 14px 18px;
    margin-bottom: 16px; font-size: 0.9rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .status.show { display: flex; }
  .spinner {
    width: 18px; height: 18px; border: 3px solid #ddd;
    border-top-color: #003476; border-radius: 50%;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 12px; margin-bottom: 18px;
  }
  .stat { background: white; border-radius: 10px; padding: 16px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
  .stat .n { font-size: 2rem; font-weight: 700; color: #003476; }
  .stat .n.orange { color: #c8860a; }
  .stat .l { font-size: 0.78rem; color: #666; margin-top: 4px; }

  .section { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); overflow: hidden; margin-bottom: 16px; }
  .section-head {
    padding: 12px 20px; font-size: 0.95rem; color: #003476; font-weight: 600;
    border-bottom: 1px solid #eef1f6; background: #f7f9fc;
    display: flex; align-items: center; gap: 8px;
  }
  .badge { background: #003476; color: white; border-radius: 12px; padding: 2px 8px; font-size: 0.75rem; }

  .result-item { padding: 13px 20px; border-bottom: 1px solid #f0f3f8; }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: #f7f9fc; }
  .result-item .title { font-size: 0.9rem; font-weight: 600; color: #003476; margin-bottom: 5px; line-height: 1.4; }
  .result-item a { color: #003476; text-decoration: none; }
  .result-item a:hover { text-decoration: underline; }
  .meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 0.78rem; color: #777; margin-top: 4px; }
  .meta span { background: #f0f3f8; padding: 2px 7px; border-radius: 5px; }
  .meta .kw { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }

  .ai-box {
    background: linear-gradient(135deg, #f0f7ff, #e8f0fe);
    border-left: 4px solid #003476; border-radius: 0 8px 8px 0;
    padding: 14px 18px; margin: 0 20px 16px;
    font-size: 0.9rem; line-height: 1.65;
  }
  .ai-label { font-size: 0.72rem; font-weight: 700; color: #003476; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

  .empty { padding: 36px; text-align: center; color: #bbb; font-size: 0.9rem; }
  .empty div:first-child { font-size: 2.2rem; margin-bottom: 8px; }

  .error-box {
    background: #fff3f3; border-left: 4px solid #dc3545;
    border-radius: 0 8px 8px 0; padding: 12px 16px;
    font-size: 0.88rem; color: #721c24; margin-bottom: 16px;
  }

  .info-box {
    background: #e8f4fd; border-left: 4px solid #0056b3;
    border-radius: 0 8px 8px 0; padding: 12px 16px;
    font-size: 0.85rem; color: #004085; margin-bottom: 16px;
  }
</style>
</head>
<body>

<header>
  <div style="font-size:2rem">🏛️</div>
  <div>
    <h1>Διαύγεια Agent – Ημερήσιο Report</h1>
    <p>Αυτόματη παρακολούθηση αναρτήσεων • Τροφοδοτείται από Claude AI + Web Search</p>
  </div>
</header>

<div class="container">

  <div class="info-box">
    ℹ️ Ο agent χρησιμοποιεί <strong>Claude AI με web search</strong> για να ψάξει τη Διαύγεια. Κάθε αναζήτηση παίρνει ~15-30 δευτερόλεπτα ανά λέξη-κλειδί.
  </div>

  <div class="card">
    <h2>🔍 Λέξεις-κλειδιά παρακολούθησης</h2>
    <div class="keyword-row" id="chips"></div>
    <div class="row">
      <input type="text" id="newKw" placeholder="Προσθήκη λέξης-κλειδί...">
      <button class="btn outline" onclick="addKw()">+ Προσθήκη</button>
    </div>
    <div class="row">
      <label style="align-self:center;font-size:0.88rem;color:#555">Από:</label>
      <input type="date" id="dateFrom">
      <label style="align-self:center;font-size:0.88rem;color:#555">Έως:</label>
      <input type="date" id="dateTo">
    </div>
    <button class="btn big" id="runBtn" onclick="runReport()">🔎 Εκτέλεση Report</button>
  </div>

  <div class="status" id="statusBar">
    <div class="spinner"></div>
    <span id="statusTxt">Αναζήτηση...</span>
  </div>

  <div id="errorBox" class="error-box" style="display:none"></div>
  <div class="summary-grid" id="summaryGrid" style="display:none"></div>
  <div id="output"></div>

</div>

<script>
const CLAUDE_API = "https://api.anthropic.com/v1/messages";

let keywords = [
  "πληροφοριακές πινακίδες",
  "πινακίδες σήμανσης",
  "παιδικές χαρές",
  "σήμανση οδών",
  "παιδική χαρά",
  "προϋπολογισμός",
  "αναμόρφωση προϋπολογισμού"
];

function renderChips() {
  document.getElementById('chips').innerHTML = keywords.map((kw, i) => `
    <div class="chip">${kw}<span class="x" onclick="removeKw(${i})">×</span></div>
  `).join('');
}

function addKw() {
  const inp = document.getElementById('newKw');
  const v = inp.value.trim();
  if (v && !keywords.includes(v)) { keywords.push(v); renderChips(); }
  inp.value = ''; inp.focus();
}
function removeKw(i) { keywords.splice(i,1); renderChips(); }
document.getElementById('newKw') && document.getElementById('newKw').addEventListener('keydown', e => { if(e.key==='Enter') addKw(); });

function setDates() {
  const t = new Date(), f = new Date(t);
  f.setDate(t.getDate()-7);
  document.getElementById('dateTo').value = t.toISOString().split('T')[0];
  document.getElementById('dateFrom').value = f.toISOString().split('T')[0];
}

function setStatus(msg) {
  document.getElementById('statusBar').classList.add('show');
  document.getElementById('statusTxt').textContent = msg;
}
function hideStatus() { document.getElementById('statusBar').classList.remove('show'); }
function showError(msg) {
  const b = document.getElementById('errorBox');
  b.style.display = 'block';
  b.innerHTML = `⚠️ ${msg}`;
}

async function searchViaClaudeAI(keyword, fromDate, toDate) {
  const prompt = `Ψάξε στη Διαύγεια (diavgeia.gov.gr) για αναρτήσεις με θέμα: "${keyword}".
Χρονική περίοδος: ${fromDate} έως ${toDate}.

Χρησιμοποίησε web search με query όπως: site:diavgeia.gov.gr "${keyword}" ή diavgeia "${keyword}" ${fromDate.substring(0,4)}

Βρες πραγματικές αναρτήσεις και επέστρεψε ΜΟΝΟ JSON array (χωρίς markdown backticks) με έως 8 αποτελέσματα:
[{"ada":"ΑΔΑ ή κενό","subject":"τίτλος","organization":"φορέας","decisionType":"τύπος πράξης","date":"dd/mm/yyyy","url":"https://diavgeia.gov.gr/doc/ΑΔΑ"}]

Αν δεν βρεθούν αποτελέσματα επέστρεψε: []`;

  const response = await fetch(CLAUDE_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${response.status}`);
  }

  const data = await response.json();
  const text = data.content.filter(c => c.type === 'text').map(c => c.text).join('');
  const match = text.match(/\[[\s\S]*?\]/);
  if (!match) return [];
  try { return JSON.parse(match[0]); } catch { return []; }
}

async function generateSummary(allResults, fromDate, toDate) {
  const sample = allResults.slice(0, 20).map(r =>
    `- ${r.subject} | ${r.organization} | ${r.decisionType} | ${r.date}`
  ).join('\n');

  const response = await fetch(CLAUDE_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 500,
      messages: [{
        role: "user",
        content: `Είσαι βοηθός επαγγελματία στον τομέα πληροφοριακών πινακίδων σήμανσης και παιδικών χαρών.

Βρέθηκαν ${allResults.length} αναρτήσεις στη Διαύγεια (${fromDate}–${toDate}):
${sample}

Γράψε σύνοψη 4-5 προτάσεων: τι βρέθηκε, τάσεις, ευκαιρίες, σύσταση. Μόνο η σύνοψη.`
      }]
    })
  });

  const data = await response.json();
  return data.content.filter(c => c.type==='text').map(c=>c.text).join('');
}

async function runReport() {
  if (!keywords.length) { alert('Προσθέστε λέξεις-κλειδιά!'); return; }
  const fromDate = document.getElementById('dateFrom').value;
  const toDate = document.getElementById('dateTo').value;
  if (!fromDate || !toDate) { alert('Επιλέξτε ημερομηνίες!'); return; }

  document.getElementById('runBtn').disabled = true;
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('summaryGrid').style.display = 'none';
  document.getElementById('output').innerHTML = '';

  const allResults = [];
  const byKw = {};
  const seenKeys = new Set();

  try {
    for (let i = 0; i < keywords.length; i++) {
      const kw = keywords[i];
      setStatus(`🔍 Αναζήτηση "${kw}" (${i+1}/${keywords.length}) — παρακαλώ περιμένετε...`);
      try {
        const results = await searchViaClaudeAI(kw, fromDate, toDate);
        const unique = results.filter(r => {
          const key = (r.ada || r.subject || '').trim().toLowerCase();
          if (!key || seenKeys.has(key)) return false;
          seenKeys.add(key);
          return true;
        });
        byKw[kw] = unique;
        unique.forEach(r => allResults.push({...r, matchedKw: kw}));
      } catch(e) {
        console.warn(`Σφάλμα για "${kw}":`, e);
        byKw[kw] = [];
      }
    }

    hideStatus();
    renderOutput(byKw, allResults, fromDate, toDate);

  } catch(e) {
    hideStatus();
    showError(`Σφάλμα: ${e.message}`);
  } finally {
    document.getElementById('runBtn').disabled = false;
  }
}

function renderOutput(byKw, allResults, fromDate, toDate) {
  const orgs = new Set(allResults.map(r => r.organization).filter(Boolean));

  const sg = document.getElementById('summaryGrid');
  sg.style.display = 'grid';
  sg.innerHTML = `
    <div class="stat"><div class="n orange">${allResults.length}</div><div class="l">Σύνολο αναρτήσεων</div></div>
    <div class="stat"><div class="n">${orgs.size}</div><div class="l">Φορείς</div></div>
    <div class="stat"><div class="n">${Object.values(byKw).filter(v=>v.length).length}</div><div class="l">Ενεργές λέξεις-κλειδιά</div></div>
  `;

  let html = `<div class="section">
    <div class="section-head">🤖 Σύνοψη AI <span style="font-size:0.75rem;font-weight:400;color:#888;margin-left:6px">powered by Claude</span></div>
    <div class="ai-box" id="aiBox"><div class="ai-label">⏳ Αναλύω αποτελέσματα...</div></div>
  </div>`;

  if (allResults.length === 0) {
    html += `<div class="section"><div class="empty"><div>📭</div>Δεν βρέθηκαν αναρτήσεις. Δοκιμάστε ευρύτερο εύρος ημερομηνιών.</div></div>`;
  } else {
    for (const [kw, items] of Object.entries(byKw)) {
      if (!items.length) continue;
      html += `<div class="section"><div class="section-head">🔑 "${kw}" <span class="badge">${items.length}</span></div>`;
      items.forEach(r => {
        html += `<div class="result-item">
          <div class="title"><a href="${r.url||'#'}" target="_blank">${r.subject||'Χωρίς τίτλο'}</a></div>
          <div class="meta">
            <span>📅 ${r.date||'—'}</span>
            <span>🏛️ ${(r.organization||'—').substring(0,60)}</span>
            ${r.decisionType?`<span>${r.decisionType}</span>`:''}
            ${r.ada?`<span>ΑΔΑ: ${r.ada}</span>`:''}
            <span class="kw">🔑 ${kw}</span>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
  }

  document.getElementById('output').innerHTML = html;

  if (allResults.length > 0) {
    generateSummary(allResults, fromDate, toDate).then(text => {
      const box = document.getElementById('aiBox');
      if (box) box.innerHTML = `<div class="ai-label">🤖 Ανάλυση AI</div>${text}`;
    }).catch(() => {
      const box = document.getElementById('aiBox');
      if (box) box.innerHTML = `<div class="ai-label">⚠️</div>Η σύνοψη δεν ήταν διαθέσιμη.`;
    });
  } else {
    const box = document.getElementById('aiBox');
    if (box) box.innerHTML = `<div class="ai-label">ℹ️</div>Δεν βρέθηκαν αναρτήσεις για σύνοψη.`;
  }
}

renderChips();
setDates();
</script>
</body>
</html>
